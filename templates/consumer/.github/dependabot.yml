# .github/dependabot.yml
# ─────────────────────────────────────────────────────────────────
# TEMPLATE: Copia este archivo a .github/dependabot.yml
# en tu repositorio y ajusta los ecosistemas según tu stack.
# ─────────────────────────────────────────────────────────────────

version: 2

updates:
  # ─── GitHub Actions (siempre incluir) ─────────────────────────
  # Mantiene las acciones pinned por hash actualizadas de forma segura
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Madrid"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      github-actions-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    open-pull-requests-limit: 10

