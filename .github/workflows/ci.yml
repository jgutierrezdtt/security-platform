name: Platform CI — Self Security Scan

# ─────────────────────────────────────────────────────────────────
# Este workflow aplica el mismo estándar de seguridad a este
# repositorio. Sirve como referencia y demostración del sistema.
# ─────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main, "feature/**", "fix/**"]
  pull_request:
    branches: [main]
  schedule:
    # Escaneo completo semanal (domingo 01:00 UTC)
    - cron: "0 1 * * 0"
  workflow_dispatch:
    inputs:
      scan-scope:
        description: "Alcance del escaneo"
        type: choice
        options: [diff, full]
        default: full

permissions:
  contents: read

jobs:
  # ─── Semgrep ─────────────────────────────────
  semgrep:
    name: Semgrep SAST
    uses: amazing-protection/security-platform/.github/workflows/reusable/semgrep-scan.yml@main
    with:
      scan-scope: ${{ github.event_name == 'schedule' && 'full' || inputs.scan-scope || 'diff' }}
      fail-on-severity: high
      upload-sarif: true
      create-issues: ${{ github.event_name == 'schedule' }}
      exceptions-repo: amazing-protection/security-exceptions
    secrets:
      SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
      EXCEPTIONS_READER_TOKEN: ${{ secrets.EXCEPTIONS_READER_TOKEN }}

  # ─── Dependabot check ────────────────────────
  dependabot:
    name: Dependabot Status
    uses: amazing-protection/security-platform/.github/workflows/reusable/dependabot-check.yml@main
    with:
      fail-on-critical: true
      fail-on-high: true
      check-dependabot-enabled: true
    secrets:
      DEPENDABOT_CHECK_TOKEN: ${{ secrets.DEPENDABOT_CHECK_TOKEN }}

  # ─── OpenSSF Scorecard ───────────────────────
  scorecard:
    name: OpenSSF Scorecard
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'

    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read

    steps:
      - name: Run Scorecard
        uses: ossf/scorecard-action@v2.3.3
        with:
          results_file: scorecard.sarif
          results_format: sarif
          publish_results: true

      - name: Upload Scorecard SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: scorecard.sarif
          category: scorecard
